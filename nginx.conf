server {
    listen 80;
    server_name transcribe.qirelab.com;

    # Backend API (NestJS, port 6103).
    # Trailing slash on proxy_pass strips the /api/ prefix:
    #   /api/setup/status  ->  localhost:6103/setup/status
    location /api/ {
        proxy_pass http://localhost:6103/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # Audio/video uploads can be large
        client_max_body_size 500M;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_request_buffering off;
    }

    # Frontend (Next.js, port 6102)
    location / {
        proxy_pass http://localhost:6102;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    error_log /var/log/nginx/transcribe.error.log;
    access_log /var/log/nginx/transcribe.access.log;
}
